<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplikasi Input Nilai NAFA</title>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #fff8dc, #fffdf3);
    color: #3f3106;
  }

  .portal {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 22px;
  }

  .card {
    width: min(680px, 94vw);
    text-align: center;
    background: #ffffff;
    border: 1px solid #f3dd8a;
    border-radius: 24px;
    padding: 36px 26px;
    box-shadow: 0 14px 38px rgba(121, 85, 0, 0.13);
  }

  .badge {
    display: inline-block;
    background: #fff3b0;
    color: #7c5b00;
    border: 1px solid #ecd16a;
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: bold;
    margin-bottom: 14px;
  }

  h1 {
    margin: 0;
    font-family: "Times New Roman", serif;
    font-size: clamp(30px, 5vw, 48px);
    line-height: 1.15;
    color: #4b3a05;
  }

  p {
    margin: 14px auto 0;
    max-width: 520px;
    color: #6d5a23;
    font-size: 15px;
    line-height: 1.6;
  }

  .buttons {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-top: 30px;
  }

  a {
    text-decoration: none;
  }

  .btn {
    display: block;
    border-radius: 18px;
    padding: 22px 16px;
    color: #ffffff;
    font-size: 25px;
    font-weight: bold;
    box-shadow: 0 10px 22px rgba(0, 0, 0, 0.14);
    transition: 0.16s ease;
  }

  .btn:hover {
    transform: translateY(-2px);
    filter: brightness(0.98);
  }

  .smp {
    background: #198754;
  }

  .sma {
    background: #2563eb;
  }

  .rekap {
    background: #7c3aed;
  }

  .note {
    margin-top: 22px;
    font-size: 20px;
    color: #7a6a34;
  }

  @media (max-width: 560px) {
    .buttons {
      grid-template-columns: 1fr;
    }

    .card {
      padding: 30px 18px;
    }
  }
</style>
</head>
<body>
  <main class="portal">
    <section class="card">
      <div class="badge">NAFA • Input Nilai</div>
      <h1>Aplikasi Input Nilai NAFA</h1>
      <p>Silakan pilih jenjang untuk input nilai, atau buka halaman rekap untuk melihat nilai yang sudah dikirim.</p>

      <div class="buttons">
        <a href="SMP Input Nilai Asas 2026.html">
          <span class="btn smp">SMP</span>
        </a>
        <a href="SMA Input Nilai Asas 2026.html">
          <span class="btn sma">SMA</span>
        </a>
        <a href="rekap-nilai.html">
          <span class="btn rekap">LIHAT NILAI</span>
        </a>
      </div>

      <div class="note">Selamat Bekerja 😊</div>
    </section>
  </main>
</body>
</html>
